<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="60%" stop-color="#111927"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
    <linearGradient id="nameGrad" gradientUnits="userSpaceOnUse" x1="52" y1="0" x2="650" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="55%" stop-color="#bc8cff"/>
      <stop offset="100%" stop-color="#f778ba"/>
    </linearGradient>
    <linearGradient id="sepGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="1"/>
      <stop offset="70%" stop-color="#bc8cff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#bc8cff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ng" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Faint circuit grid (right half) -->
  <g opacity="0.055" stroke="#58a6ff" stroke-width="0.5" stroke-dasharray="2,10">
    <line x1="680" y1="0" x2="680" y2="300"/><line x1="720" y1="0" x2="720" y2="300"/>
    <line x1="760" y1="0" x2="760" y2="300"/><line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="840" y1="0" x2="840" y2="300"/><line x1="880" y1="0" x2="880" y2="300"/>
    <line x1="920" y1="0" x2="920" y2="300"/><line x1="960" y1="0" x2="960" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/><line x1="1040" y1="0" x2="1040" y2="300"/>
    <line x1="1080" y1="0" x2="1080" y2="300"/><line x1="1120" y1="0" x2="1120" y2="300"/>
    <line x1="1160" y1="0" x2="1160" y2="300"/>
    <line x1="660" y1="40" x2="1200" y2="40"/><line x1="660" y1="80" x2="1200" y2="80"/>
    <line x1="660" y1="120" x2="1200" y2="120"/><line x1="660" y1="160" x2="1200" y2="160"/>
    <line x1="660" y1="200" x2="1200" y2="200"/><line x1="660" y1="240" x2="1200" y2="240"/>
    <line x1="660" y1="280" x2="1200" y2="280"/>
  </g>

  <!-- Circuit traces (dim base) -->
  <g stroke="#1c2535" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="710,80 790,80 790,40 910,40 910,20"/>
    <polyline points="910,40 1090,40 1090,130 990,130 990,210"/>
    <polyline points="790,80 790,165 870,165 870,250 1050,250"/>
    <polyline points="870,165 1010,165 1010,130"/>
    <polyline points="730,210 810,210 810,265 970,265"/>
    <polyline points="1050,250 1050,200 1090,200 1090,130"/>
    <polyline points="970,265 1170,265 1170,165 1090,165 1090,130"/>
    <polyline points="710,165 730,165 730,210"/>
    <polyline points="680,270 770,270 770,300"/>
    <polyline points="770,270 770,230 810,230"/>
  </g>

  <!-- Accent circuit traces -->
  <g stroke="#28364d" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="790,80 910,80 910,40"/>
    <polyline points="870,165 870,80"/>
    <polyline points="990,210 990,265"/>
    <polyline points="1010,165 1010,80 1090,80 1090,40"/>
  </g>

  <!-- Blue nodes -->
  <g fill="#58a6ff" filter="url(#ng)">
    <circle cx="710" cy="80" r="4.5" opacity="0.8"/>
    <circle cx="790" cy="40" r="5.5" opacity="0.9"/>
    <circle cx="790" cy="80" r="3.5" opacity="0.6"/>
    <circle cx="910" cy="40" r="4.5" opacity="0.75"/>
    <circle cx="1090" cy="40" r="4" opacity="0.7"/>
    <circle cx="1090" cy="130" r="5.5" opacity="0.85"/>
    <circle cx="990" cy="130" r="4.5" opacity="0.7"/>
    <circle cx="730" cy="210" r="4" opacity="0.6"/>
    <circle cx="810" cy="210" r="4" opacity="0.6"/>
    <circle cx="910" cy="20" r="3" opacity="0.5"/>
    <circle cx="1010" cy="165" r="3.5" opacity="0.55"/>
    <circle cx="1010" cy="80" r="3" opacity="0.45"/>
    <circle cx="1090" cy="80" r="3" opacity="0.45"/>
  </g>

  <!-- Purple nodes -->
  <g fill="#bc8cff" filter="url(#ng)">
    <circle cx="870" cy="165" r="6" opacity="0.9"/>
    <circle cx="990" cy="210" r="5.5" opacity="0.85"/>
    <circle cx="1050" cy="250" r="5" opacity="0.8"/>
    <circle cx="970" cy="265" r="4.5" opacity="0.7"/>
    <circle cx="1170" cy="265" r="4.5" opacity="0.7"/>
    <circle cx="1090" cy="165" r="4" opacity="0.65"/>
    <circle cx="810" cy="265" r="3.5" opacity="0.55"/>
    <circle cx="990" cy="265" r="3" opacity="0.5"/>
  </g>

  <!-- Pink accent nodes -->
  <g fill="#f778ba" filter="url(#ng)">
    <circle cx="870" cy="250" r="4" opacity="0.75"/>
    <circle cx="1170" cy="165" r="4" opacity="0.7"/>
    <circle cx="770" cy="270" r="3.5" opacity="0.6"/>
    <circle cx="1050" cy="200" r="3" opacity="0.55"/>
  </g>

  <!-- Green accent node -->
  <g fill="#3fb950" filter="url(#ng)">
    <circle cx="680" cy="270" r="3" opacity="0.6"/>
    <circle cx="870" cy="80" r="3" opacity="0.5"/>
  </g>

  <!-- IC Chip 1 -->
  <rect x="830" y="58" width="58" height="40" rx="4" fill="#161b22" stroke="#28364d" stroke-width="1.5"/>
  <rect x="839" y="65" width="40" height="26" rx="2" fill="#0d1117"/>
  <text x="859" y="82" font-family="monospace" font-size="8" fill="#30363d" text-anchor="middle">ECE</text>
  <line x1="830" y1="67" x2="823" y2="67" stroke="#28364d" stroke-width="1.5"/>
  <line x1="830" y1="76" x2="823" y2="76" stroke="#28364d" stroke-width="1.5"/>
  <line x1="830" y1="85" x2="823" y2="85" stroke="#28364d" stroke-width="1.5"/>
  <line x1="888" y1="67" x2="895" y2="67" stroke="#28364d" stroke-width="1.5"/>
  <line x1="888" y1="76" x2="895" y2="76" stroke="#28364d" stroke-width="1.5"/>
  <line x1="888" y1="85" x2="895" y2="85" stroke="#28364d" stroke-width="1.5"/>
  <circle cx="842" cy="68" r="2.5" fill="#58a6ff" opacity="0.65"/>

  <!-- IC Chip 2 -->
  <rect x="912" y="174" width="48" height="34" rx="4" fill="#161b22" stroke="#28364d" stroke-width="1.5"/>
  <rect x="920" y="181" width="32" height="20" rx="2" fill="#0d1117"/>
  <text x="936" y="195" font-family="monospace" font-size="7" fill="#30363d" text-anchor="middle">AI</text>
  <line x1="912" y1="182" x2="906" y2="182" stroke="#28364d" stroke-width="1.5"/>
  <line x1="912" y1="191" x2="906" y2="191" stroke="#28364d" stroke-width="1.5"/>
  <line x1="912" y1="200" x2="906" y2="200" stroke="#28364d" stroke-width="1.5"/>
  <line x1="960" y1="182" x2="966" y2="182" stroke="#28364d" stroke-width="1.5"/>
  <line x1="960" y1="191" x2="966" y2="191" stroke="#28364d" stroke-width="1.5"/>
  <circle cx="922" cy="183" r="2" fill="#bc8cff" opacity="0.7"/>

  <!-- Resistor elements on traces -->
  <rect x="940" y="36" width="24" height="8" rx="3" fill="#161b22" stroke="#28364d" stroke-width="1"/>
  <rect x="1062" y="196" width="20" height="8" rx="3" fill="#161b22" stroke="#28364d" stroke-width="1"/>
  <rect x="1070" y="116" width="8" height="18" rx="3" fill="#161b22" stroke="#28364d" stroke-width="1"/>

  <!-- Vertical separator -->
  <line x1="660" y1="18" x2="660" y2="282" stroke="#21262d" stroke-width="1" opacity="0.6"/>

  <!-- ===== LEFT CONTENT ===== -->

  <!-- Name with gradient -->
  <text x="52" y="118"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="57"
    font-style="italic"
    font-weight="bold"
    fill="url(#nameGrad)"
    filter="url(#glow)">Subhajit Kumar Das</text>

  <!-- Separator line under name -->
  <rect x="52" y="132" width="550" height="2.5" fill="url(#sepGrad)" rx="1.25"/>

  <!-- Title / Role -->
  <text x="54" y="165"
    font-family="Arial, Helvetica, sans-serif"
    font-size="17"
    fill="#8b949e"
    letter-spacing="1.8">B.Tech ECE  ·  Full Stack Developer in Progress</text>

  <!-- Email line -->
  <text x="54" y="202"
    font-family="Arial, Helvetica, sans-serif"
    font-size="14"
    fill="#6e7681">&#9993;  dassubhajit695@gmail.com</text>

  <!-- Portfolio line -->
  <text x="54" y="227"
    font-family="Arial, Helvetica, sans-serif"
    font-size="14"
    fill="#58a6ff">&#9670;  subhajitkumardas567.github.io/my-portfolio</text>

  <!-- Tags / Pill badges -->
  <!-- Patent Holder -->
  <rect x="52" y="248" width="168" height="26" rx="13" fill="#bc8cff" fill-opacity="0.08" stroke="#bc8cff" stroke-width="1" stroke-opacity="0.65"/>
  <text x="136" y="266"
    font-family="Arial, Helvetica, sans-serif"
    font-size="12"
    fill="#bc8cff"
    text-anchor="middle">&#127942; Patent Holder</text>

  <!-- AI and IoT -->
  <rect x="232" y="248" width="108" height="26" rx="13" fill="#58a6ff" fill-opacity="0.08" stroke="#58a6ff" stroke-width="1" stroke-opacity="0.65"/>
  <text x="286" y="266"
    font-family="Arial, Helvetica, sans-serif"
    font-size="12"
    fill="#58a6ff"
    text-anchor="middle">&#128640; AI &amp; IoT</text>

  <!-- DSA -->
  <rect x="352" y="248" width="85" height="26" rx="13" fill="#3fb950" fill-opacity="0.08" stroke="#3fb950" stroke-width="1" stroke-opacity="0.65"/>
  <text x="394" y="266"
    font-family="Arial, Helvetica, sans-serif"
    font-size="12"
    fill="#3fb950"
    text-anchor="middle">&#128218; DSA</text>

  <!-- React -->
  <rect x="449" y="248" width="88" height="26" rx="13" fill="#f778ba" fill-opacity="0.08" stroke="#f778ba" stroke-width="1" stroke-opacity="0.65"/>
  <text x="493" y="266"
    font-family="Arial, Helvetica, sans-serif"
    font-size="12"
    fill="#f778ba"
    text-anchor="middle">&#9883; React</text>
</svg>
